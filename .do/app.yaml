name: ensure-safety-analytics
region: nyc

services:
  # Backend API Service
  - name: backend
    environment_slug: python
    github:
      branch: main
      deploy_on_push: true
      repo: MMZareian/ensure-app
    source_dir: /backend
    run_command: uvicorn app.main:app --host 0.0.0.0 --port 8080
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    routes:
      - path: /api
    envs:
      - key: PORT
        value: "8080"

static_sites:
  # Frontend Static Site
  - name: frontend
    github:
      branch: main
      deploy_on_push: true
      repo: MMZareian/ensure-app
    source_dir: /frontend
    build_command: npm install && npm run build
    output_dir: dist
    routes:
      - path: /
    envs:
      - key: VITE_API_URL
        value: ${APP_URL}
